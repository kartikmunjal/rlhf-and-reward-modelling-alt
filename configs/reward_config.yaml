# Stage 2 — Reward Model Training config
# Bradley-Terry preference model: r(x,y_w) - r(x,y_l) maximised via BT loss

sft_checkpoint: checkpoints/sft
output_dir: checkpoints/reward_model

# Data
dataset: Anthropic/hh-rlhf
subset: harmless-base
num_train_samples: 10000
num_eval_samples: 1000
max_length: 512

# Training
num_epochs: 2
batch_size: 4
gradient_accumulation_steps: 4   # effective batch = 16
learning_rate: 1.0e-5
weight_decay: 0.01
warmup_ratio: 0.05

# Hardware
fp16: true

# Logging
log_every: 50
